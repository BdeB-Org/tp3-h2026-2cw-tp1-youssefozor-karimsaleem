<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservations - Hôtel Lux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="reservation-page">

    <div class="haut-page">
        <div class="logo">
            Hôtel Lux <br>
            <span style="color:white; font-size:40px;">
                Hôtel de prestige depuis 1970
            </span>
            <br>
            ❀
        </div>

        <div class="barre-navigation">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="salles.html">Chambres</a></li>
                <li><a href="clients.html">Mes Réservations</a></li>
            </ul>
        </div>
    </div>

    <div class="description">
        Veuillez compléter votre réservation en sélectionnant les dates désirées.
    </div>

    <div class="cadre-exterieur">
        <div class="conteneur">
            <div class="boite">
                <div class="entete-boite">
                    Réservation de chambre
                </div>
                <div class="contenu">
                    <div class="zone-reservation">
                        <div class="titre-reservation">
                            Réservation
                        </div>
                        <div class="ligne-point"></div>
                        <div class="sous-titre">
                            Réservations
                        </div>
                        <div class="ligne-point"></div>
                        <div class="information">
                            Chambre :
                            <span class="numero">101</span>
                        </div>
                        
                        <form id="reservation-form">
                            <div class="champ">
                                <label class="date-debut">Date début</label>
                                <input type="date" id="start_date">
                            </div>
                            <div class="champ">
                                <label class="date-fin">Date fin</label>
                                <input type="date" id="end_date">
                            </div>
                            <input type="hidden" id="id_reservation">
                            <input type="hidden" id="client_id">
                            <input type="hidden" id="salle_id">
                            
                            <div class="zone-bouton">
                                <button type="submit" class="bouton-confirmation">Confirmer</button>
                            </div>
                        </form>
                        
                        <table style="display:none;">
                            <tbody id="reservations-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="bas-page"></div>
</body>
</html>
