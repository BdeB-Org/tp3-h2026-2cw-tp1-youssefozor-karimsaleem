<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservations - Hôtel Lux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="reservation-page">

    <div class="haut-page">
        <div class="logo">
            Hôtel Lux <br>
            <span style="color:white; font-size:40px;">
                Hôtel de prestige depuis 1970
            </span>
            <br>
            ❀
        </div>
        <div class="barre-navigation">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="salles.html">Chambres</a></li>
                <li><a href="clients.html">Clients</a></li>
                <li><a href="reservations.html">Réservations</a></li>
            </ul>
        </div>
    </div>

    <div class="description">
        Gestion des réservations. Associez un client à une chambre pour des dates spécifiques.
    </div>

    <div class="cadre-exterieur">
        <div class="conteneur">
            <div id="reservation-message" class="message"></div>

            <div class="boite" style="margin-bottom: 25px;">
                <div class="entete-boite">Créer une réservation</div>
                <div class="contenu" style="background: #efefef;">
                    <form id="reservation-form" style="display: flex; flex-direction: column; gap: 15px;">
                      
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">ID du Client :</label>
                            <input type="number" id="res_client_id" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">ID de la Chambre :</label>
                            <input type="number" id="res_salle_id" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #00c853;">Date de début :</label>
                            <input type="date" id="start_date" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #ff2b2b;">Date de fin :</label>
                            <input type="date" id="end_date" required style="width: 250px; padding: 6px;">
                        </div>
                        
                        <div style="text-align: right; margin-top: 5px;">
                            <button type="submit" style="background: #ffe600; border: 2px solid #b3a100; color: black; padding: 8px 20px; font-weight: bold; font-family: 'Brush Script MT', cursive; font-size: 24px; cursor: pointer;">
                                Confirmer
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <div class="boite">
                <div class="entete-boite">Liste des réservations actives</div>
                <div class="contenu" style="background: white; padding: 10px;">
                    <table style="width: 100%; border-collapse: collapse; color: black;">
                        <thead>
                            <tr style="background: #303030; color: white; text-align: left;">
                                <th style="padding: 10px; border: 1px solid #ddd;">ID Réservation</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Client</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Chambre</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Début</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Fin</th>
                                <th style="padding: 10px; border: 1px solid #ddd;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="reservations-body">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div class="bas-page"></div>

    <script src="js/api.js"></script>
    <script src="js/reservations.js"></script>
</body>
</html>
