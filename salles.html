<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chambres - Hôtel Lux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="salle-page">

    <div class="haut-page">
        <div class="logo">
            Hôtel Lux <br>
            <span style="color:white; font-size:40px;">
                Hôtel de prestige depuis 1970
            </span>
            <br>
            ❀
        </div>

        <div class="barre-navigation">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="salles.html">Chambres</a></li>
                <li><a href="clients.html">Clients</a></li>
                <li><a href="reservations.html">Réservations</a></li>
            </ul>
        </div>
    </div>

    <div class="description">
       Gestion des chambres de l'hôtel. Ajoutez de nouvelles chambres ou retirez-les du système.
    </div>

    <div class="cadre-exterieur">
        <div class="conteneur">
            <div id="salle-message" class="message"></div>
            
            <div class="boite" style="margin-bottom: 25px;">
                <div class="entete-boite">Ajouter une chambre</div>
                <div class="contenu" style="background: #efefef;">
                    <form id="salle-form" style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">ID Salle :</label>
                            <input type="number" id="id_salle" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">Type :</label>
                            <input type="text" id="type_salle" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">Prix ($) :</label>
                            <input type="number" id="prix_salle" required style="width: 250px; padding: 6px;">
                        </div>
                    
                        <div style="text-align: right; margin-top: 5px;">
                            <button type="submit" style="background: #18b818; border: 1px solid #006600; color: white; padding: 8px 20px; font-weight: bold; cursor: pointer;">
                                Ajouter la chambre
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="boite">
                <div class="entete-boite">
                    Liste des chambres
                </div>
                <div class="contenu">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                        </thead>
                        <tbody id="salles-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="bas-page"></div>

    <script src="js/api.js"></script>
    <script src="js/salles.js"></script>
</body>
</html>
