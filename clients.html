<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre des Clients - Hôtel Lux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body id="client-page">

    <div class="haut-page">
        <div class="logo">
            Hôtel Lux <br>
            <span style="color:white; font-size:40px;">
                Hôtel de prestige depuis 1970
            </span>
            <br>
            ❀
        </div>
        <div class="barre-navigation">
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="salles.html">Chambres</a></li>
                <li><a href="clients.html">Clients</a></li>
                <li><a href="reservations.html">Réservations</a></li>
            </ul>
        </div>
    </div>

    <div class="description">
        Registre officiel de la clientèle de l'Hôtel Lux. Ajoutez de nouveaux profils ou supprimez des comptes existants.
    </div>

    <div class="cadre-exterieur">
        <div class="conteneur">
            
            <div id="client-message" class="message"></div>

            <div class="boite" style="margin-bottom: 25px;">
                <div class="entete-boite">Enregistrer un nouveau client</div>
                <div class="contenu" style="background: #efefef;">
                    <form id="client-form" style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">ID Client (Numérique) :</label>
                            <input type="number" id="id_client" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">Nom complet :</label>
                            <input type="text" id="nom_client" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="font-weight: bold; color: #111;">Adresse Courriel :</label>
                            <input type="email" id="email_client" required style="width: 250px; padding: 6px;">
                        </div>
                        <div style="text-align: right; margin-top: 5px;">
                            <button type="submit" style="background: #18b818; border: 1px solid #006600; color: white; padding: 8px 20px; font-weight: bold; cursor: pointer;">
                                Valider l'inscription
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="boite">
                <div class="entete-boite" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Liste des Clients enregistrés</span>
                    <button id="reload-clients" style="background: #3498db; color: white; padding: 5px 12px; font-size: 14px; cursor: pointer; border: none; font-weight: bold;">
                        Rafraîchir
                    </button>
                </div>
                <div class="contenu" style="background: white; padding: 10px;">
                    <table style="width: 100%; border-collapse: collapse; color: black;">
                        <thead>
                            <tr style="background: #303030; color: white;">
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">ID</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Nom</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Courriel</th>
                                <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clients-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <div class="bas-page"></div>
    <script src="js/api.js"></script>
    <script src="js/clients.js"></script>
</body>
</html>
